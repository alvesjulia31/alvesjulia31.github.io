<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casamentos | André Machado</title>
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .project-hero {
            height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(13,13,13,1)), url('https://images.unsplash.com/photo-1519225421980-715cb0215aed?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }
        .gallery-item img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border-radius: 8px;
            transition: var(--transition-medium);
        }
        .gallery-item:hover img {
            transform: scale(1.02);
        }
        .back-link {
            display: inline-block;
            margin-bottom: 2rem;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <nav class="navbar scrolled">
        <a href="../../index.html" class="logo">AM.</a>
        <div class="nav-links">
            <a href="../../index.html#portfolio">Portfólio</a>
            <a href="../../index.html#projects">projects</a>
            <a href="../../index.html#sobre">Sobre</a>
            <a href="../../index.html#contacto">Contacto</a>
        </div>
        <div class="hamburger">
            <span></span>
            <span></span>
        </div>
    </nav>

    <header class="project-hero">
        <div class="hero-content">
            <h1 class="fade-up">Casamentos</h1>
            <p class="fade-up delay-1">Amor autêntico captado de forma natural.</p>
        </div>
    </header>

    <main>
        <section class="section">
            <div class="container">
                <a href="../../index.html" class="back-link reveal">← Voltar ao Início</a>
                
                <div class="about-text reveal delay-1" style="max-width: 800px; margin: 0 auto; text-align: center;">
                    <p>O dia do casamento é uma coleção de pequenos momentos fugazes. O meu objetivo é passar despercebido, capturando a essência de cada emoção, cada lágrima e cada sorriso genuíno.</p>
                </div>

                <div class="gallery-grid">
                    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1511895426328-dc8714191300?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Casamento"></div>
                    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1520854221256-17451cc331bf?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Casamento"></div>
                    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1606800052052-a08af7148866?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Casamento"></div>
                    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1543854589-99a38fbe84cc?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Casamento"></div>
                    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1532712938736-59c715894d04?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Casamento"></div>
                    <div class="gallery-item reveal"><img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" alt="Casamento"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <span class="close-lightbox">&times;</span>
        <div class="lightbox-content">
            <img id="lightbox-img" src="" alt="">
        </div>
    </div>

    <script src="../../js/main.js"></script>
</body>
</html>
